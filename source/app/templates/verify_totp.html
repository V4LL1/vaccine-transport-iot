<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação MFA — VaccineTransport IoT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f0f0f;
  --surface: #1c1c1c;
  --border:  rgba(255,255,255,0.08);
  --text:    #ededed;
  --muted:   #888;
  --accent:  #3ECF8E;
  --accent-d:#2db67d;
  --danger:  #f66060;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.card {
  width: 100%; max-width: 380px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px;
}
.card-icon {
  width: 48px; height: 48px;
  background: rgba(62,207,142,.12); border: 1px solid rgba(62,207,142,.2);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 20px;
}
.card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
.card-sub   { font-size: .82rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.info-box {
  background: rgba(96,165,250,.06); border: 1px solid rgba(96,165,250,.15);
  border-radius: 8px; padding: 11px 13px;
  font-size: .77rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px;
}
.info-box strong { color: #60a5fa; }
.form-field label {
  display: block; font-size: .72rem; font-weight: 500; color: var(--muted); margin-bottom: 6px;
}
.form-field input {
  width: 100%;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: .75rem 1rem; color: var(--text);
  font-family: 'Inter', monospace; font-size: 1.5rem;
  font-weight: 700; letter-spacing: .4em; text-align: center;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.form-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(62,207,142,.12); }
.form-field input::placeholder { font-size: .85rem; letter-spacing: normal; font-weight: 400; }
.btn {
  width: 100%; margin-top: 14px; padding: .75rem;
  background: var(--accent); color: #0f0f0f;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: .88rem; font-weight: 700;
  cursor: pointer; transition: background .15s, transform .1s;
}
.btn:hover { background: var(--accent-d); }
.btn:active { transform: translateY(1px); }
.error-box {
  background: rgba(246,96,96,.08); border: 1px solid rgba(246,96,96,.2);
  border-left: 3px solid var(--danger); color: #fca5a5; border-radius: 8px;
  padding: .65rem .9rem; font-size: .8rem; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.back-link {
  display: block; text-align: center; margin-top: 16px;
  font-size: .78rem; color: var(--muted); text-decoration: none;
}
.back-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="card-icon">📱</div>
  <div class="card-title">Verificação em dois fatores</div>
  <div class="card-sub">Digite o código de 6 dígitos do seu aplicativo autenticador.</div>
  <div class="info-box">
    <strong>Código rotativo.</strong> O código muda a cada 30 segundos — use o código atual exibido no Google Authenticator ou Authy.
  </div>
  {% if error %}<div class="error-box">⚠ {{ error }}</div>{% endif %}
  <form method="POST" action="/verify-totp">
    <div class="form-field">
      <label for="totp_code">Código TOTP</label>
      <input type="text" id="totp_code" name="code"
             inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
             placeholder="000000" autocomplete="one-time-code" autofocus required>
    </div>
    <button type="submit" class="btn">Verificar →</button>
  </form>
  <a href="/login" class="back-link">← Voltar ao login</a>
</div>
</body>
</html>
