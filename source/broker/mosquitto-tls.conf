# ============================================================
# Mosquitto — Configuração TLS/SSL (Milestone 2)
# Porta 8883 com autenticação por certificado + senha
# ============================================================

# Listener TLS na porta 8883
listener 8883

# Certificados
cafile   C:/Users/guilh/Desktop/vaccine-transport-iot/certs/ca.crt
certfile C:/Users/guilh/Desktop/vaccine-transport-iot/certs/broker.crt
keyfile  C:/Users/guilh/Desktop/vaccine-transport-iot/certs/broker.key

# Versão mínima TLS
tls_version tlsv1.2

# Autenticação por usuário/senha (ESP32 autentica com credenciais)
allow_anonymous false
password_file C:/Users/guilh/Desktop/vaccine-transport-iot/source/broker/passwd

# ACL — cada device só publica em seu próprio tópico
acl_file C:/Users/guilh/Desktop/vaccine-transport-iot/source/broker/acl

# Logging
log_type all
log_dest file C:/Users/guilh/Desktop/vaccine-transport-iot/source/broker/mosquitto-tls.log
