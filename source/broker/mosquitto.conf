# ============================================================
# Mosquitto — Configuração Milestone 1 (sem segurança)
# ============================================================
# Para rodar: mosquitto -c mosquitto.conf -v
#
# ATENÇÃO: Esta configuração é APENAS para desenvolvimento local.
# O Milestone 2 substitui este arquivo por mosquitto-tls.conf
# com TLS, autenticação e ACLs.
# ============================================================

listener 1883
allow_anonymous true

# Log para console
log_type all
